<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GênioPlay - Offline</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background-color: #f8fafc; color: #1e293b; text-align: center; }
        h1 { color: #2563eb; margin-bottom: 10px; }
        p { color: #64748b; margin-bottom: 30px; }

    <h1>Você está offline 📡</h1>
    <p>Conecte-se à internet para continuar seus estudos épicos!</p>
